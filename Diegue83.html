<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Juan Diego Juarez Cruz</title>

  <style>
    *{
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: Arial, sans-serif;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: linear-gradient(135deg, #141e30, #243b55);
      overflow: hidden;
      color: white;
    }

    .card {
      width: 400px;
      background: rgba(255,255,255,0.1);
      border: 1px solid rgba(255,255,255,0.2);
      backdrop-filter: blur(12px);
      border-radius: 25px;
      padding: 35px;
      text-align: center;
      box-shadow: 0 10px 30px rgba(0,0,0,0.4);
      animation: aparecer 1s ease;
    }

    @keyframes aparecer {
      from{
        opacity: 0;
        transform: translateY(30px);
      }
      to{
        opacity: 1;
        transform: translateY(0);
      }
    }

    .foto {
      width: 120px;
      height: 120px;
      border-radius: 50%;
      margin-bottom: 20px;
      border: 4px solid white;
      object-fit: cover;
    }

    h1 {
      font-size: 32px;
      margin-bottom: 10px;
    }

    h2 {
      font-size: 18px;
      color: #dbe9ff;
      margin-bottom: 20px;
      font-weight: normal;
    }

    p {
      font-size: 16px;
      line-height: 1.6;
      margin-bottom: 15px;
    }

    .skills {
      margin: 20px 0;
    }

    .skill {
      display: inline-block;
      background: rgba(255,255,255,0.2);
      padding: 8px 15px;
      border-radius: 20px;
      margin: 5px;
      font-size: 14px;
    }

    button {
      margin-top: 20px;
      padding: 12px 25px;
      border: none;
      border-radius: 12px;
      background: white;
      color: #243b55;
      font-size: 16px;
      cursor: pointer;
      transition: 0.3s;
      font-weight: bold;
    }

    button:hover {
      transform: scale(1.05);
      background: #dbe9ff;
    }

    .footer {
      margin-top: 20px;
      font-size: 13px;
      opacity: 0.8;
    }
  </style>
</head>

<body>

  <div class="card">

    <img 
      class="foto"
      src="https://cdn-icons-png.flaticon.com/512/3135/3135715.png"
      alt="Foto de perfil"
    >

    <h1>Juan Diego Juarez Cruz 👋</h1>

    <h2>Desarrollador de Software</h2>

    <p>
      Bienvenido a mi página web personal.
    </p>

    <p>
      Me apasiona crear aplicaciones modernas, interfaces atractivas
      y proyectos innovadores usando tecnologías actuales.
    </p>

    <div class="skills">
      <span class="skill">HTML</span>
      <span class="skill">CSS</span>
      <span class="skill">JavaScript</span>
      <span class="skill">Flutter</span>
    </div>

    <button onclick="mostrarMensaje()">
      Conóceme más
    </button>

    <div class="footer">
      © 2026 - Página creada por Diego
    </div>

  </div>

  <script>
    function mostrarMensaje() {
      alert("¡Gracias por visitar mi página web! 🚀");
    }
  </script>

</body>
</html>
